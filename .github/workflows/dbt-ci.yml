name: dbt CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "dbt/transformation/**"
      - ".github/workflows/dbt-ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "dbt/transformation/**"
      - ".github/workflows/dbt-ci.yml"

permissions:
  contents: read
  id-token: write

jobs:
  verify-dbt-project:
    name: Verify dbt project (parse/compile)
    runs-on: ubuntu-latest
    env:
      DBT_TARGET: ci
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID != '' && secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
      GCP_LOCATION: ${{ secrets.GCP_LOCATION != '' && secrets.GCP_LOCATION || vars.GCP_LOCATION != '' && vars.GCP_LOCATION || 'EU' }}
      AR_REGION: europe-west1
      AR_REPO: datatalent
      IMAGE_NAME: dbt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Auth requis avant parse/compile : dbt-bigquery 1.8+ tente l'auth même sans run
      - name: Auth GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER != '' && secrets.GCP_WIF_PROVIDER || vars.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT != '' && secrets.GCP_WIF_SERVICE_ACCOUNT || vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Build dbt image
        run: |
          docker build \
            -f dbt/transformation/Dockerfile \
            -t datatalent-dbt-ci:latest \
            -t ${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:latest \
            -t ${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA::8} \
            dbt/transformation

      - name: dbt parse
        run: |
          docker run --rm \
            -e DBT_TARGET=${DBT_TARGET} \
            -e GCP_PROJECT_ID=${GCP_PROJECT_ID} \
            -e GCP_LOCATION=${GCP_LOCATION} \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json \
            -v "${GOOGLE_APPLICATION_CREDENTIALS}:/tmp/gcp-creds.json:ro" \
            datatalent-dbt-ci:latest \
            dbt parse --project-dir /app --profiles-dir /app

      - name: dbt compile
        run: |
          docker run --rm \
            -e DBT_TARGET=${DBT_TARGET} \
            -e GCP_PROJECT_ID=${GCP_PROJECT_ID} \
            -e GCP_LOCATION=${GCP_LOCATION} \
            -e GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json \
            -v "${GOOGLE_APPLICATION_CREDENTIALS}:/tmp/gcp-creds.json:ro" \
            datatalent-dbt-ci:latest \
            dbt compile --project-dir /app --profiles-dir /app

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push'
        run: gcloud auth configure-docker ${AR_REGION}-docker.pkg.dev --quiet

      - name: Push dbt image to Artifact Registry
        if: github.event_name == 'push'
        run: |
          docker push ${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:latest
          docker push ${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${IMAGE_NAME}:${GITHUB_SHA::8}
